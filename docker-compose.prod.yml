services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: eduvault-api:latest
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/api/v1/health/ready >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: eduvault-api:latest
    profiles: ["ops"]
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    command: ["./scripts/migrate.sh"]

  seed:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: eduvault-api:latest
    profiles: ["ops"]
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    command: ["./scripts/seed-local.sh"]

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-edustell}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-edustell}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
