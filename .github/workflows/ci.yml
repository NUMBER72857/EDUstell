name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

env:
  APP_NAME: EDUstell
  APP_ENV: local
  APP_HOST: 0.0.0.0
  APP_PORT: 8080
  DATABASE_URL: postgres://postgres:postgres@localhost:5432/edustell
  TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/edustell
  RUST_LOG: info
  LOG_FORMAT: pretty
  JWT_ACCESS_SECRET: access-secret-access-secret-1234
  JWT_REFRESH_SECRET: refresh-secret-refresh-secret-1234
  JWT_ACCESS_TTL_SECS: 900
  JWT_REFRESH_TTL_SECS: 2592000

jobs:
  rust-ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: edustell
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d edustell"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install SQLx CLI
        run: cargo install sqlx-cli --no-default-features --features postgres

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            pg_isready -h localhost -U postgres -d edustell && exit 0
            sleep 2
          done
          exit 1

      - name: Lint
        run: |
          cargo fmt --all -- --check
          cargo check --workspace

      - name: Test
        run: ./scripts/test-ci.sh

      - name: Build
        run: cargo build --workspace --release

      - name: Build API Docker image
        run: docker build -f Dockerfile.api -t eduvault-api:ci .

      - name: Note missing web app
        run: |
          echo "Web image build is intentionally skipped."
          echo "This repository does not contain a deployable web application."
